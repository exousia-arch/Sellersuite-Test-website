<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | PPC<span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-cyan-500">Bench</span></title>
  <meta name="robots" content="noindex">
  <meta name="description" content="Sign in to the PPCBench private beta with your access code.">
  <link rel="canonical" href="https://ppcbench.com/login">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2048%2048'%3E%3Cdefs%3E%3ClinearGradient%20id%3D'g'%20x1%3D'0'%20y1%3D'1'%20x2%3D'1'%20y2%3D'0'%3E%3Cstop%20offset%3D'0'%20stop-color%3D'%236366f1'%2F%3E%3Cstop%20offset%3D'1'%20stop-color%3D'%2322d3ee'%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D'48'%20height%3D'48'%20rx%3D'12'%20fill%3D'%230f172a'%2F%3E%3Crect%20x%3D'11'%20y%3D'27'%20width%3D'6'%20height%3D'12'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3Crect%20x%3D'20'%20y%3D'21'%20width%3D'6'%20height%3D'18'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3Crect%20x%3D'29'%20y%3D'15'%20width%3D'6'%20height%3D'24'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3C%2Fsvg%3E">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">
  <header class="p-4">
    <div class="max-w-5xl mx-auto px-2">
      <a href="/" class="text-xl font-extrabold tracking-tight text-slate-900 flex items-center gap-2 w-max"><svg class="w-5 h-5 text-slate-900 shrink-0" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="pbgl" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs><path d="M12 7 H7 V41 H12" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M36 7 H41 V41 H36" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="15" y="27" width="6" height="12" rx="2" fill="url(#pbgl)"/><rect x="22.5" y="21" width="6" height="18" rx="2" fill="url(#pbgl)"/><rect x="30" y="14" width="6" height="25" rx="2" fill="url(#pbgl)"/></svg> PPC<span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-cyan-500">Bench</span></a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-5 py-10">
    <div class="w-full max-w-sm">
      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
        <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-5"><i data-lucide="lock" class="w-6 h-6"></i></div>
        <h1 class="text-2xl font-extrabold text-slate-900 mb-1">Sign in</h1>
        <p class="text-slate-500 text-sm mb-6">PPCBench is in private beta. Sign in with your account.</p>
        <form id="loginForm" onsubmit="return submitLogin(event)">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Username</label>
          <input type="text" id="username" autocomplete="username" autocapitalize="none" spellcheck="false" autofocus required placeholder="Username" class="w-full border border-slate-300 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" id="password" autocomplete="current-password" required placeholder="Password" class="w-full border border-slate-300 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          <p id="msg" class="text-xs text-rose-600 mt-2 hidden"></p>
          <button type="submit" id="btn" class="w-full mt-4 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition-colors disabled:opacity-60 disabled:cursor-not-allowed">Sign in</button>
        </form>
      </div>
      <p class="text-center text-sm text-slate-500 mt-5">Don't have an account? <a href="/request-access" class="text-indigo-600 font-semibold hover:underline">Request access</a></p>
    </div>
  </main>

  <script>
    lucide.createIcons();
    // If already signed in, skip the form and go straight to the app.
    fetch('/api/me', { headers: { 'Accept': 'application/json' } })
      .then(r => r.json()).then(d => { if (d && d.authed) location.replace('/app'); }).catch(() => {});
    async function submitLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      msg.classList.add('hidden');
      if (!username || !password) return false;
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        if (r.ok) { window.location.replace('/app'); return false; }
        const d = await r.json().catch(() => ({}));
        msg.textContent = d.error || 'Invalid username or password.';
        msg.classList.remove('hidden');
      } catch (err) {
        msg.textContent = 'Network error — please try again.';
        msg.classList.remove('hidden');
      }
      btn.disabled = false; btn.textContent = 'Sign in';
      return false;
    }
  </script>
</body>
</html>
