<!-- PPCBench app icon / favicon: framed benchmark bars. Self-contained (dark
     rounded square + gradient bars) so it works on any background, down to 16px. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="PPCBench">
  <defs>
    <linearGradient id="ppcbGradIcon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="#0f172a"/>
  <rect x="11" y="27" width="6" height="12" rx="2" fill="url(#ppcbGradIcon)"/>
  <rect x="20" y="21" width="6" height="18" rx="2" fill="url(#ppcbGradIcon)"/>
  <rect x="29" y="15" width="6" height="24" rx="2" fill="url(#ppcbGradIcon)"/>
</svg>
