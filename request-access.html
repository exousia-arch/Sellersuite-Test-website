<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request access | PPC<span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-500 to-orange-700">Bench</span></title>
  <meta name="description" content="Request access to the PPCBench private beta — Amazon PPC tools that run entirely in your browser, free for testers during the beta.">
  <link rel="canonical" href="https://ppcbench.com/request-access">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2048%2048'%3E%3Cdefs%3E%3ClinearGradient%20id%3D'g'%20x1%3D'0'%20y1%3D'1'%20x2%3D'1'%20y2%3D'0'%3E%3Cstop%20offset%3D'0'%20stop-color%3D'%23f97316'%2F%3E%3Cstop%20offset%3D'1'%20stop-color%3D'%23c2410c'%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D'48'%20height%3D'48'%20rx%3D'12'%20fill%3D'%230f172a'%2F%3E%3Crect%20x%3D'11'%20y%3D'27'%20width%3D'6'%20height%3D'12'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3Crect%20x%3D'20'%20y%3D'21'%20width%3D'6'%20height%3D'18'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3Crect%20x%3D'29'%20y%3D'15'%20width%3D'6'%20height%3D'24'%20rx%3D'2'%20fill%3D'url(%23g)'%2F%3E%3C%2Fsvg%3E">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">
  <header class="p-4">
    <div class="max-w-5xl mx-auto px-2 flex justify-between items-center">
      <a href="/" class="text-xl font-extrabold tracking-tight text-slate-900 flex items-center gap-2 w-max"><svg class="w-5 h-5 text-slate-900 shrink-0" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="pbgl" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#c2410c"/></linearGradient></defs><path d="M12 7 H7 V41 H12" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M36 7 H41 V41 H36" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="15" y="27" width="6" height="12" rx="2" fill="url(#pbgl)"/><rect x="22.5" y="21" width="6" height="18" rx="2" fill="url(#pbgl)"/><rect x="30" y="14" width="6" height="25" rx="2" fill="url(#pbgl)"/></svg> PPC<span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-500 to-orange-700">Bench</span></a>
      <a href="/login" class="text-sm font-semibold text-slate-500 hover:text-orange-700">Have an account? Sign in</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-5 py-10">
    <div class="w-full max-w-lg">
      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
        <span class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-orange-700 bg-orange-100 ring-1 ring-orange-200 px-3 py-1 rounded-full mb-4"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span> Private beta</span>
        <h1 class="text-2xl font-extrabold text-slate-900 mb-1">Request access</h1>
        <p class="text-slate-500 text-sm mb-6">Tell us a little about you. If it's a fit, we'll email you a private login.</p>

        <form id="reqForm" onsubmit="return submitRequest(event)" class="space-y-4">
          <input type="text" name="company_website" tabindex="-1" autocomplete="off" class="hidden" aria-hidden="true">

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Name</label>
            <input type="text" name="name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-orange-500">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
            <input type="email" name="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-orange-500">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Role</label>
              <select name="role" class="w-full border border-slate-300 bg-white rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-orange-500">
                <option>Brand owner / Seller</option>
                <option>Agency / Consultant</option>
                <option>Aggregator</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Monthly ad spend</label>
              <select name="spend" class="w-full border border-slate-300 bg-white rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-orange-500">
                <option>&lt; $5k</option>
                <option>$5k–$25k</option>
                <option>$25k–$100k</option>
                <option>$100k+</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">What would you use PPCBench for? (optional)</label>
            <textarea name="usecase" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-orange-500 resize-y"></textarea>
          </div>
          <button type="submit" id="reqBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition-colors disabled:opacity-60 disabled:cursor-not-allowed">Request access</button>
          <p id="reqMsg" class="text-sm hidden"></p>
        </form>
      </div>
      <p class="text-center text-xs text-slate-400 mt-5">We'll only use your details to evaluate beta access. See our <a href="/privacy" class="text-orange-700 hover:underline">Privacy Policy</a>.</p>
    </div>
  </main>

  <script>
    lucide.createIcons();
    async function submitRequest(e) {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('reqBtn');
      const msg = document.getElementById('reqMsg');
      const show = (text, ok) => { msg.textContent = text; msg.className = 'text-sm ' + (ok ? 'text-emerald-600' : 'text-rose-600'); };
      const data = Object.fromEntries(new FormData(form).entries());
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch('/api/request-access', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (r.ok) { form.reset(); show('Thanks! We’ve received your request and will email you if it’s a fit.', true); btn.textContent = 'Requested ✓'; return false; }
        if (r.status === 503) {
          show('Request form isn’t connected yet — please email hello@ppcbench.com with your details and we’ll send your login.', true);
        } else {
          const d = await r.json().catch(() => ({}));
          show(d.error === 'forward_failed' ? 'Something went wrong — please email hello@ppcbench.com.' : (d.error || 'Please check your details and try again.'), false);
        }
      } catch (err) { show('Network error — please try again or email hello@ppcbench.com.', false); }
      btn.disabled = false; btn.textContent = 'Request access';
      return false;
    }
  </script>
</body>
</html>
